<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机数生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+SC:wght@400;500;700&family=Press+Start+2P&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/determination-mono-web" rel="stylesheet">
    <style>
        :root {
            --bg-from: #f0f4ff;
            --bg-to: #ffffff;
            --glass-bg: rgba(255,255,255,0.55);
            --glass-border: rgba(255,255,255,0.85);
            --glass-shadow: 0 8px 40px rgba(100,120,200,0.10), 0 1.5px 0 rgba(255,255,255,0.95) inset;
            --glass-highlight: rgba(255,255,255,0.92);
            --text: #1a1d2e;
            --text2: #6070a0;
            --accent: #2563eb;
            --accent2: #1d4ed8;
            --accent-glow: rgba(37,99,235,0.28);
            --danger: #ef4444;
            --number-font: 'JetBrains Mono', monospace;
            --ui-font: 'Noto Sans SC', sans-serif;
            --radius: 20px;
            --blur: 32px;
        }
        body.dark-mode {
            --bg-from: #0d1025;
            --bg-to: #1a0d30;
            --glass-bg: rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.18);
            --glass-shadow: 0 8px 40px rgba(0,0,0,0.45), 0 1.5px 0 rgba(255,255,255,0.15) inset;
            --glass-highlight: rgba(255,255,255,0.15);
            --text: #e8eaf0;
            --text2: #8890b0;
            --accent: #3b82f6;
            --accent2: #2563eb;
            --accent-glow: rgba(59,130,246,0.35);
            --danger: #f87171;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            font-family: var(--ui-font);
            color: var(--text);
            overflow: hidden;
            transition: color 0.4s;
        }

        #stage-wrap {
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-from), var(--bg-to));
            transition: background 0.5s;
            position: relative;
        }

        /* Ambient orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.55;
            pointer-events: none;
            animation: orbFloat ease-in-out infinite alternate;
        }
        .orb1 { width: 35%; height: 50%; background: radial-gradient(circle, #dbe8ff, transparent); top: -10%; left: -5%; animation-duration: 12s; }
        .orb2 { width: 28%; height: 40%; background: radial-gradient(circle, #e8e0ff, transparent); bottom: -5%; right: -5%; animation-duration: 15s; animation-delay: -4s; }
        .orb3 { width: 22%; height: 30%; background: radial-gradient(circle, #d0f0e8, transparent); top: 30%; right: 20%; animation-duration: 10s; animation-delay: -7s; }
        body.dark-mode .orb { opacity: 0.35; }
        @keyframes orbFloat {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(3%, 4%) scale(1.08); }
        }

        #stage {
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(80,100,180,0.14), 0 2px 0 rgba(255,255,255,0.98) inset;
        }
        body.dark-mode #stage {
            box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 2px 0 rgba(255,255,255,0.08) inset;
        }

        /* Glass utility */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* Specular highlight layer */
        .glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(160deg, var(--glass-highlight) 0%, transparent 40%);
            pointer-events: none;
        }

        /* HEADER */
        #header {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 10%;
            padding: 0 2%;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 1px 0 var(--glass-highlight) inset;
        }

        #settings-btn {
            position: absolute;
            left: 2%;
            font-family: var(--ui-font);
            font-size: clamp(11px, 1.6vw, 15px);
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text2);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: clamp(5px,0.8%,9px) clamp(10px,1.5%,18px);
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 1px 0 var(--glass-highlight) inset;
        }
        #settings-btn:hover {
            color: var(--accent);
            background: rgba(255,255,255,0.36);
            transform: scale(1.06);
            box-shadow: 0 4px 16px var(--accent-glow), 0 1px 0 var(--glass-highlight) inset;
        }

        #header-title {
            font-family: var(--number-font);
            font-size: clamp(12px,2vw,18px);
            font-weight: 700;
            color: var(--text2);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* HISTORY TOGGLE BUTTON */
        #history-toggle-btn {
            position: absolute;
            right: 2%;
            font-family: var(--ui-font);
            font-size: clamp(11px, 1.6vw, 15px);
            font-weight: 700;
            color: var(--text2);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: clamp(5px,0.8%,9px) clamp(10px,1.5%,18px);
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 1px 0 var(--glass-highlight) inset;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #history-toggle-btn:hover {
            color: var(--accent);
            background: rgba(255,255,255,0.36);
            transform: scale(1.06);
        }
        #history-count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            background: var(--accent);
            color: #fff;
            border-radius: 20px;
            font-size: 11px;
            font-family: var(--number-font);
            font-weight: 800;
            transition: all 0.3s;
            opacity: 0;
            transform: scale(0.6);
        }
        #history-count-badge.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* MAIN */
        #main {
            position: absolute;
            top: 10%; left: 0; right: 0; bottom: 10%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2% 3%;
            z-index: 1;
        }

        /* DISPLAY BOX */
        #display-box {
            position: relative;
            min-width: clamp(180px, 35%, 420px);
            min-height: clamp(90px, 14%, 160px);
            padding: clamp(18px, 3%, 40px) clamp(32px, 6%, 80px);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: default;
            transition: transform 0.3s;
            /* Glass */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1.5px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* Inner specular top highlight */
        #display-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(180deg, var(--glass-highlight) 0%, transparent 100%);
            border-radius: 24px 24px 0 0;
            pointer-events: none;
            z-index: 1;
        }

        /* Glow overlay */
        #display-box::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, var(--accent-glow) 0%, transparent 65%);
            opacity: 0;
            transition: opacity 0.6s;
            pointer-events: none;
            z-index: 0;
        }
        #display-box.glow::after { opacity: 1; }

        #display-box.pulse {
            animation: boxPulse 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes boxPulse {
            0%   { transform: scale(1); }
            25%  { transform: scale(1.028); box-shadow: 0 0 0 10px var(--accent-glow), var(--glass-shadow); }
            65%  { transform: scale(0.992); }
            85%  { transform: scale(1.004); }
            100% { transform: scale(1); }
        }

        #number-display {
            font-family: var(--number-font);
            font-size: clamp(32px, 8vw, 88px);
            font-weight: 800;
            color: var(--text);
            position: relative;
            z-index: 2;
            user-select: none;
            text-shadow: 0 2px 20px rgba(255,255,255,0.5);
            transition: color 0.4s;
        }

        @keyframes slotRoll {
            0%   { transform: translateY(-50px) rotateX(-15deg) scale(0.92); opacity: 0; filter: blur(6px); }
            55%  { transform: translateY(4px) rotateX(3deg) scale(1.02); opacity: 1; filter: blur(0); }
            75%  { transform: translateY(-2px) scale(0.99); }
            90%  { transform: translateY(1px) scale(1.005); }
            100% { transform: translateY(0) scale(1); }
        }
        #number-display.rolling {
            animation: slotRoll 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* GENERATE BUTTON */
        #generate-btn {
            position: relative;
            margin-top: clamp(14px, 3%, 28px);
            padding: clamp(10px,1.8%,18px) clamp(24px,5%,60px);
            font-size: clamp(13px,2vw,18px);
            font-family: var(--ui-font);
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            overflow: hidden;
            touch-action: manipulation;
            white-space: nowrap;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: var(--text);
            border: 1.5px solid var(--glass-border);
            box-shadow: 0 4px 24px rgba(100,120,200,0.18), 0 1.5px 0 var(--glass-highlight) inset;
            transition: transform 0.18s, box-shadow 0.25s, filter 0.2s;
        }
        #generate-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(180deg, var(--glass-highlight) 0%, transparent 100%);
            border-radius: 50px 50px 0 0;
            pointer-events: none;
        }
        #generate-btn:hover {
            transform: translateY(-2px) scale(1.03);
            color: var(--accent);
            box-shadow: 0 8px 36px var(--accent-glow), 0 1.5px 0 var(--glass-highlight) inset;
            filter: brightness(1.06);
        }
        #generate-btn:active { transform: scale(0.96); }

        /* DISPLAY AREA (column) */
        #display-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HISTORY PANEL (overlay inside main) */
        #history-panel {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #history-panel.open {
            opacity: 1;
            pointer-events: auto;
        }

        #history-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.08);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            pointer-events: none;
        }
        #history-panel.open #history-backdrop {
            pointer-events: auto;
        }

        #history-box {
            position: relative;
            z-index: 1;
            width: clamp(220px, 50%, 420px);
            max-height: 80%;
            border-radius: 24px;
            padding: clamp(14px,2.5%,28px);
            display: flex;
            flex-direction: column;
            transform: translateY(20px) scale(0.96);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
            opacity: 0;
            /* Glass */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur)) saturate(200%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(200%);
            border: 1.5px solid var(--glass-border);
            box-shadow: 0 16px 60px rgba(0,0,0,0.2), 0 1.5px 0 var(--glass-highlight) inset;
        }
        #history-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 40%;
            background: linear-gradient(180deg, var(--glass-highlight) 0%, transparent 100%);
            border-radius: 24px 24px 0 0;
            pointer-events: none;
        }
        #history-panel.open #history-box {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        #history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        #history-header h3 {
            font-family: var(--number-font);
            font-size: clamp(11px, 1.5vw, 15px);
            font-weight: 700;
            color: var(--text2);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        #history-close-btn {
            background: rgba(255,255,255,0.18);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text2);
            font-size: 14px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        #history-close-btn:hover { background: rgba(255,255,255,0.35); color: var(--text); }

        #numbers-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.3) transparent;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-content: flex-start;
            padding: 4px 2px;
        }
        #numbers-list li {
            font-family: var(--number-font);
            font-size: clamp(12px, 1.6vw, 16px);
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 50px;
            background: rgba(255,255,255,0.18);
            border: 1px solid var(--glass-border);
            color: var(--text);
            transition: transform 0.3s, opacity 0.3s;
            opacity: 0;
            transform: scale(0.7);
            box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset;
        }
        #numbers-list li.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* FOOTER */
        #footer {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 10%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border-top: 1px solid var(--glass-border);
            box-shadow: 0 -1px 0 var(--glass-highlight) inset;
        }

        #clear-btn {
            padding: clamp(7px,1.2%,13px) clamp(18px,3.5%,42px);
            font-size: clamp(12px,1.8vw,16px);
            font-family: var(--ui-font);
            font-weight: 700;
            background: var(--glass-bg);
            color: var(--text);
            border: 1.5px solid var(--glass-border);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(100,120,200,0.12), 0 1px 0 var(--glass-highlight) inset;
            position: relative;
            overflow: hidden;
        }
        #clear-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(180deg, var(--glass-highlight) 0%, transparent 100%);
            border-radius: 50px 50px 0 0;
            pointer-events: none;
        }
        #clear-btn:hover {
            transform: scale(1.04);
            color: var(--accent);
            box-shadow: 0 6px 28px var(--accent-glow), 0 1px 0 var(--glass-highlight) inset;
        }
        #clear-btn:active { transform: scale(0.95); }

        /* RANGE LABEL */
        #range-label {
            position: absolute;
            bottom: 10%;
            right: 2%;
            font-family: var(--number-font);
            font-size: clamp(9px,1.2vw,13px);
            color: var(--text2);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 4px 10px;
            z-index: 2;
            pointer-events: none;
            box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset;
        }

        /* MODALS */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            position: relative;
            padding: clamp(16px,3vw,32px);
            border-radius: 24px;
            width: 88%;
            max-width: 380px;
            text-align: center;
            color: var(--text);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            /* Glass */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur)) saturate(200%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(200%);
            border: 1.5px solid var(--glass-border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 1.5px 0 var(--glass-highlight) inset;
        }
        .modal-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(180deg, var(--glass-highlight) 0%, transparent 100%);
            border-radius: 24px 24px 0 0;
            pointer-events: none;
        }
        @keyframes slideUp {
            from { transform: translateY(30px) scale(0.94); opacity: 0; filter: blur(4px); }
            to   { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
        }
        .modal-content button {
            position: relative;
            padding: 9px 20px;
            margin: 8px 5px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-family: var(--ui-font);
            font-weight: 700;
            transition: transform 0.15s, filter 0.15s;
            border: 1.5px solid var(--glass-border);
            backdrop-filter: blur(12px);
        }
        .modal-content button:hover { transform: scale(1.05); filter: brightness(1.08); }

        #accept-btn {
            background: var(--glass-bg);
            color: var(--text);
            border: 1.5px solid var(--glass-border);
            box-shadow: 0 4px 18px rgba(100,120,200,0.12), 0 1px 0 var(--glass-highlight) inset;
        }
        #decline-btn {
            background: var(--glass-bg);
            color: var(--text2);
        }

        /* SETTINGS */
        #settings-content {
            position: relative;
            padding: clamp(14px,3vw,28px);
            border-radius: 24px;
            width: 88%;
            max-width: 420px;
            color: var(--text);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh;
            overflow-y: auto;
            /* Glass */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur)) saturate(200%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(200%);
            border: 1.5px solid var(--glass-border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 1.5px 0 var(--glass-highlight) inset;
        }
        #settings-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 40%;
            background: linear-gradient(180deg, var(--glass-highlight) 0%, transparent 100%);
            border-radius: 24px 24px 0 0;
            pointer-events: none;
        }
        #settings-content h2 {
            font-family: var(--number-font);
            font-size: clamp(14px,2.5vw,22px);
            margin-bottom: 16px;
            font-weight: 800;
            color: var(--text);
        }
        #settings-options { display: flex; flex-direction: column; gap: 4px; }
        .option {
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 14px;
            font-size: clamp(12px,1.8vw,16px);
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid transparent;
            color: var(--text);
        }
        .option:hover {
            background: rgba(255,255,255,0.2);
            border-color: var(--glass-border);
            padding-left: 22px;
            box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset;
        }

        #sub-content {
            display: none;
            margin-top: 12px;
            padding: 14px;
            background: rgba(255,255,255,0.12);
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            animation: subSlide 0.25s ease;
            box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset;
        }
        @keyframes subSlide {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        #sub-content input {
            width: 70px;
            padding: 6px 8px;
            margin: 4px;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: var(--text);
            font-family: var(--number-font);
            font-weight: 700;
            font-size: 15px;
            text-align: center;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
        }
        #sub-content input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        #save-range {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 22px;
            background: var(--glass-bg);
            color: var(--text);
            border: 1.5px solid var(--glass-border);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-family: var(--ui-font);
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(100,120,200,0.12), 0 1px 0 var(--glass-highlight) inset;
            backdrop-filter: blur(12px);
        }
        #save-range:hover { transform: scale(1.04); color: var(--accent); border-color: var(--accent); }

        #close-settings {
            margin-top: 14px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.15);
            color: var(--text2);
            border: 1.5px solid var(--glass-border);
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            font-family: var(--ui-font);
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset;
        }
        #close-settings:hover { background: rgba(255,255,255,0.28); color: var(--text); }

        .link-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: var(--glass-bg);
            color: var(--text);
            border: 1.5px solid var(--glass-border);
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--ui-font);
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 0 1px 0 var(--glass-highlight) inset;
            backdrop-filter: blur(12px);
        }
        .link-btn:hover { transform: translateX(4px); color: var(--accent); border-color: var(--accent); }

        .lang-btn, .mode-btn {
            padding: 8px 18px;
            margin: 4px;
            background: rgba(255,255,255,0.15);
            color: var(--text);
            border: 1.5px solid var(--glass-border);
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--ui-font);
            font-weight: 700;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset;
        }
        .lang-btn:hover, .mode-btn:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.05); }

        /* PARTICLES */
        #particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0%   { transform: translateY(110%) scale(0); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.2; }
            100% { transform: translateY(-110%) scale(1.2); opacity: 0; }
        }

        /* RIPPLE */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            pointer-events: none;
        }
        @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

        /* MINECRAFT */
        #minecraft-overlay {
            display: none; position: fixed; inset: 0; background: #000;
            z-index: 2000; justify-content: center; align-items: center;
        }
        #minecraft-animation {
            width: 100%; height: 100%;
            background-image: url('https://media.giphy.com/media/12NUbkX6p4xOO4/giphy.gif');
            background-size: cover; background-position: center;
        }
        #black-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 2001; }
        /* 1225 EASTER EGG */
        #easter-1225 {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 3000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        #easter-1225.show {
            display: flex;
        }
        #easter-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            text-align: center;
            padding: 0 10%;
        }
        .pixel-line-en {
            font-family: 'Determination Mono Web', 'Press Start 2P', monospace;
            font-size: clamp(18px, 3vw, 40px);
            color: #fff;
            opacity: 0;
            animation: pixelAppear 0.1s steps(1) forwards;
            animation-delay: 0.6s;
            image-rendering: pixelated;
            letter-spacing: 0.05em;
            line-height: 1.8;
            text-align: center;
        }
        @keyframes pixelAppear {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* Mobile portrait (9:16) adjustments */
        @media (max-width: 768px) and (orientation: portrait) {
            #header { height: 8%; }
            #main { top: 8%; bottom: 8%; }
            #footer { height: 8%; }
            #range-label { bottom: 8%; font-size: clamp(9px, 2.5vw, 14px); }
            #number-display { font-size: clamp(52px, 18vw, 120px); }
            #display-box { width: clamp(220px, 88%, 400px); }
            #generate-btn { padding: clamp(12px, 3%, 22px) clamp(28px, 10%, 70px); font-size: clamp(14px, 4vw, 20px); }
            #header-title { font-size: clamp(11px, 3.5vw, 16px); }
            #settings-btn, #history-toggle-btn { font-size: clamp(10px, 2.8vw, 14px); }
            #clear-btn { font-size: clamp(12px, 3.5vw, 16px); }
        }
    </style>
</head>

let currentLang = localStorage.getItem('language') || 'zh';
let useStorage = localStorage.getItem('useStorage') === 'true';
let isDarkMode = useStorage ? localStorage.getItem('darkMode') === 'true' : false;
let MIN = useStorage ? (parseInt(localStorage.getItem('minRange')) || 1) : 1;
let MAX = useStorage ? (parseInt(localStorage.getItem('maxRange')) || 100) : 100;
let generatedNumbers = useStorage ? (JSON.parse(localStorage.getItem('generatedNumbers')) || []) : [];
let historyOpen = false;

if (isDarkMode) document.body.classList.add('dark-mode');

/* Responsive Stage: 9:16 on mobile portrait, 16:9 otherwise */
function resizeStage() {
    const stage = document.getElementById('stage');
    const ww = window.innerWidth, wh = window.innerHeight;
    const isMobile = ww <= 768;
    const isPortrait = wh > ww;
    let w, h;
    if (isMobile && isPortrait) {
        // 9:16 portrait for mobile
        if (ww / wh <= 9 / 16) { w = ww; h = w * 16 / 9; }
        else { h = wh; w = h * 9 / 16; }
    } else {
        // 16:9 for landscape / desktop
        if (ww / wh >= 16 / 9) { h = wh; w = h * 16 / 9; }
        else { w = ww; h = w * 9 / 16; }
    }
    stage.style.width = w + 'px';
    stage.style.height = h + 'px';
}
resizeStage();
window.addEventListener('resize', resizeStage);

/* Particles */
(function initParticles() {
    const container = document.getElementById('particles');
    const colors = ['rgba(37,99,235,0.5)', 'rgba(16,185,129,0.5)', 'rgba(167,139,250,0.5)', 'rgba(245,158,11,0.5)'];
    for (let i = 0; i < 16; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 6 + 3;
        p.style.cssText = `
            width:${size}px; height:${size}px;
            left:${Math.random()*100}%;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            animation-duration:${Math.random()*10+8}s;
            animation-delay:${Math.random()*8}s;
            filter: blur(${Math.random()*1.5}px);
        `;
        container.appendChild(p);
    }
})();

/* Ripple */
function addRipple(btn, e) {
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.width = r.style.height = size + 'px';
    r.style.left = (e.clientX - rect.left - size/2) + 'px';
    r.style.top  = (e.clientY - rect.top  - size/2) + 'px';
    btn.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
}

/* Badge update */
function updateBadge() {
    const badge = document.getElementById('history-count-badge');
    const count = generatedNumbers.length;
    badge.textContent = count;
    if (count > 0) badge.classList.add('visible');
    else badge.classList.remove('visible');
}

/* List update */
function updateList() {
    const list = document.getElementById('numbers-list');
    list.innerHTML = '';
    generatedNumbers.forEach((num, i) => {
        const li = document.createElement('li');
        li.textContent = num;
        list.appendChild(li);
        requestAnimationFrame(() => {
            setTimeout(() => li.classList.add('visible'), i * 40);
        });
    });
    updateBadge();
}

/* Translations */

    const t = translations[currentLang];
    document.title = t.title;
    document.getElementById('header-title').textContent = t.title;
    document.getElementById('generate-btn').textContent = t.generate;

function updateRangeLabel() {
    document.getElementById('range-label').textContent = `${MIN} — ${MAX}`;
}

/* Generate */
function generateNumber(e) {
    if (generatedNumbers.length >= MAX - MIN + 1) {
        alert(translations[currentLang].allGenerated);
        return;
    }
    let num;
    do { num = Math.floor(Math.random() * (MAX - MIN + 1)) + MIN; }
    while (generatedNumbers.includes(num));
    generatedNumbers.push(num);
    if (useStorage) localStorage.setItem('generatedNumbers', JSON.stringify(generatedNumbers));

    if (e) addRipple(document.getElementById('generate-btn'), e);

    const display = document.getElementById('number-display');
    const box = document.getElementById('display-box');
    let shuffles = 0, maxShuffles = 8;
    // Faster interval
    const delays = [15, 18, 22, 28, 35, 45, 58, 75];
    function doShuffle() {
        display.textContent = Math.floor(Math.random() * (MAX - MIN + 1)) + MIN;
        shuffles++;
        if (shuffles >= maxShuffles) {
            display.textContent = num;
            display.classList.remove('rolling');
            void display.offsetWidth;
            display.classList.add('rolling');
            box.classList.remove('glow', 'pulse');
            void box.offsetWidth;
            box.classList.add('glow', 'pulse');
            box.addEventListener('animationend', () => box.classList.remove('pulse'), { once: true });
        } else {
            setTimeout(doShuffle, delays[shuffles] || 50);
        }
    }
    doShuffle();

    updateList();
}

/* Clear */
function clearNumbers() {
    generatedNumbers = [];
    if (useStorage) localStorage.removeItem('generatedNumbers');
    const display = document.getElementById('number-display');
    display.style.transition = 'opacity 0.2s';
    display.style.opacity = '0';
    setTimeout(() => { display.textContent = '-'; display.style.opacity = '1'; }, 200);
    document.getElementById('display-box').classList.remove('glow');
    updateList();
}

/* Dark mode */
function toggleDarkMode() {
    isDarkMode = !isDarkMode;
    document.body.classList.toggle('dark-mode');
    if (useStorage) localStorage.setItem('darkMode', isDarkMode);
}

/* History panel */
function toggleHistory(show) {
    const panel = document.getElementById('history-panel');
    historyOpen = show !== undefined ? show : !historyOpen;
    if (historyOpen) panel.classList.add('open');
    else panel.classList.remove('open');
}

            const minVal = inputMin.value.trim().toLowerCase();

            if (useStorage) { localStorage.setItem('minRange', MIN); localStorage.setItem('maxRange', MAX); }

        };

        sub.innerHTML = `<div style="position:relative;z-index:1;color:var(--text);font-size:13px;line-height:1.7;">${translations[currentLang].devInfo}</div>`;

            btn.onclick = () => window.location.href = url;
            sub.appendChild(btn);
        });
    } else if (option === 'languages') {
        const allLangs = [
            ['zh','langZh'],['zhTw','langZhTw'],['en','langEn'],['ja','langJa'],
            ['ko','langKo'],['ru','langRu'],['fr','langFr'],['de','langDe'],
            ['es','langEs'],['pt','langPt'],['it','langIt'],['ar','langAr'],
            ['tr','langTr'],['pl','langPl'],['vi','langVi']
        ];
        allLangs.forEach(([lang, key]) => {
            const btn = document.createElement('button');
            btn.className = 'lang-btn';
            const t = translations[currentLang] || translations['zh'];
            btn.textContent = t[key] || key;
            btn.onclick = () => changeLanguage(lang);
            sub.appendChild(btn);
        });
    } else if (option === 'darkmode') {
        [['light','light'],['dark','dark']].forEach(([mode, key]) => {
            const btn = document.createElement('button');
            btn.className = 'mode-btn'; btn.textContent = translations[currentLang][key];
            btn.onclick = () => { if ((mode==='dark') !== isDarkMode) toggleDarkMode(); };
            sub.appendChild(btn);
        });
    } else if (option === 'cookies') {
        useStorage = true; localStorage.setItem('useStorage', 'true');
        document.getElementById('cookies-option').style.display = 'none';
    }
}

function changeLanguage(lang) {
    currentLang = lang;
    if (useStorage) localStorage.setItem('language', lang);
    applyTranslations();
    document.getElementById('sub-content').style.display = 'none';
}

function minecraftAnimation() {
    const overlay = document.getElementById('minecraft-overlay');
    const animDiv = document.createElement('div');
    animDiv.id = 'minecraft-animation';
    overlay.appendChild(animDiv);
    overlay.style.display = 'flex';
    setTimeout(() => { overlay.style.display = 'none'; document.getElementById('black-screen').style.display = 'block'; }, 3000);
    setTimeout(() => { window.location.href = 'https://www.minecraft.net/zh-hans'; }, 6000);
}

function easter1225() {
    // Close settings modal first
    document.getElementById('settings-modal').style.display = 'none';
    const el = document.getElementById('easter-1225');
    // Reset animations by cloning text nodes
    const textBox = document.getElementById('easter-text');
    textBox.innerHTML = `
        <span class="pixel-line-en">* You can't find your hands.</span>
    `;
    el.classList.add('show');
    // Play music
    const audio = document.getElementById('easter-audio');
    if (audio) { audio.currentTime = 0; audio.play().catch(()=>{}); }
    // Click anywhere to dismiss
    el.addEventListener('click', () => {
        el.classList.remove('show');
        const audio = document.getElementById('easter-audio');
        if (audio) { audio.pause(); audio.currentTime = 0; }
    }, { once: true });
}

/* Events */
document.getElementById('generate-btn').addEventListener('click', generateNumber);
document.getElementById('clear-btn').addEventListener('click', clearNumbers);

function openSettings() {
    document.getElementById('settings-modal').style.display = 'flex';
    document.getElementById('sub-content').style.display = 'none';
    document.getElementById('cookies-option').style.display = useStorage ? 'none' : 'block';
}
const settingsBtn = document.getElementById('settings-btn');
settingsBtn.addEventListener('click', openSettings);
settingsBtn.addEventListener('pointerdown', function(e) {
    if (e.button === 0) { e.preventDefault(); openSettings(); }
});
document.getElementById('close-settings').addEventListener('click', () => {
    document.getElementById('settings-modal').style.display = 'none';
});
document.querySelectorAll('.option').forEach(opt => {
    opt.addEventListener('click', () => showSubContent(opt.dataset.option));
});

document.getElementById('history-toggle-btn').addEventListener('click', () => toggleHistory());
document.getElementById('history-close-btn').addEventListener('click', () => toggleHistory(false));
document.getElementById('history-backdrop').addEventListener('click', () => toggleHistory(false));

/* Cookie consent */
if (localStorage.getItem('useStorage') === null) {
    document.getElementById('cookie-modal').style.display = 'flex';
    document.getElementById('accept-btn').addEventListener('click', () => {
        useStorage = true; localStorage.setItem('useStorage', 'true');
        document.getElementById('cookie-modal').style.display = 'none';
    });
    document.getElementById('decline-btn').addEventListener('click', () => {
        useStorage = false; localStorage.setItem('useStorage', 'false');
        document.getElementById('cookie-modal').style.display = 'none';
    });
}

applyTranslations();
updateList();
</script>
